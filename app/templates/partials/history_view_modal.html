<dialog id="history-view-modal" class="backdrop:bg-slate-950/55 rounded-[2rem] p-0 shadow-2xl w-full max-w-5xl">
    <div class="bg-white p-6 sm:p-8">
        <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
                <p class="text-xs uppercase tracking-[0.35em] text-slate-400" data-history-view-kicker>Visualizacao</p>
                <h3 class="mt-2 text-2xl font-semibold text-slate-900" data-history-view-title>Detalhes do lancamento</h3>
                <p class="mt-2 text-sm text-slate-500" data-history-view-subtitle></p>
            </div>
            <button type="button" class="rounded-xl bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-200" data-history-view-close>Fechar</button>
        </div>
        <div class="mt-6 space-y-4" data-history-view-view-mode>
            <div class="space-y-4" data-history-view-body></div>
        </div>
        <div class="mt-6 hidden" data-history-view-edit-mode>
            <div class="overflow-hidden rounded-[1.75rem] border border-slate-200 bg-slate-50">
                <div class="flex items-center justify-between gap-3 border-b border-slate-200 bg-white px-4 py-3">
                    <p class="text-sm font-medium text-slate-700">Edicao inline</p>
                    <span class="text-xs uppercase tracking-[0.28em] text-slate-400">Mesmo modulo</span>
                </div>
                <iframe
                    title="Edicao do lancamento"
                    class="min-h-[70vh] w-full bg-white"
                    data-history-view-frame
                ></iframe>
            </div>
        </div>
        <div class="mt-8 flex flex-wrap justify-end gap-3">
            <button type="button" class="hidden rounded-2xl bg-slate-100 px-5 py-3 font-semibold text-slate-700 hover:bg-slate-200" data-history-view-back>Voltar para visualizacao</button>
            <a href="#" class="hidden rounded-2xl bg-slate-900 px-5 py-3 font-semibold text-white hover:bg-slate-700" data-history-view-edit>Editar</a>
            <button type="button" class="rounded-2xl bg-slate-100 px-5 py-3 font-semibold text-slate-700 hover:bg-slate-200" data-history-view-close>Fechar</button>
        </div>
    </div>
</dialog>
<script>
    (() => {
        const modal = document.getElementById('history-view-modal');
        if (!modal) return;

        const title = modal.querySelector('[data-history-view-title]');
        const subtitle = modal.querySelector('[data-history-view-subtitle]');
        const kicker = modal.querySelector('[data-history-view-kicker]');
        const body = modal.querySelector('[data-history-view-body]');
        const viewMode = modal.querySelector('[data-history-view-view-mode]');
        const editMode = modal.querySelector('[data-history-view-edit-mode]');
        const editLink = modal.querySelector('[data-history-view-edit]');
        const backButton = modal.querySelector('[data-history-view-back]');
        const frame = modal.querySelector('[data-history-view-frame]');
        let currentEditUrl = '';
        let frameLoadedForEdit = false;
        let currentKicker = 'Visualizacao';

        const isEditingLocation = (urlString) => {
            try {
                const url = new URL(urlString, window.location.origin);
                return url.pathname.endsWith('/editar') || url.searchParams.has('edit_id') || url.searchParams.has('edit_output_id');
            } catch (error) {
                return false;
            }
        };

        const setViewState = (mode) => {
            const editing = mode === 'edit';
            viewMode?.classList.toggle('hidden', editing);
            editMode?.classList.toggle('hidden', !editing);
            backButton?.classList.toggle('hidden', !editing);
            editLink?.classList.toggle('hidden', editing || !currentEditUrl);
            if (kicker) {
                kicker.textContent = editing ? 'Edicao' : currentKicker;
            }
        };

        const closeModal = ({ clearFrame = true } = {}) => {
            if (typeof modal.close === 'function' && modal.open) {
                modal.close();
            }
            setViewState('view');
            currentEditUrl = '';
            frameLoadedForEdit = false;
            if (clearFrame && frame) {
                frame.removeAttribute('src');
            }
        };

        modal.querySelectorAll('[data-history-view-close]').forEach((button) => {
            button.addEventListener('click', () => closeModal());
        });

        modal.addEventListener('cancel', (event) => {
            event.preventDefault();
            closeModal();
        });

        backButton?.addEventListener('click', () => {
            setViewState('view');
        });

        editLink?.addEventListener('click', (event) => {
            if (!currentEditUrl || !frame) return;
            event.preventDefault();
            frameLoadedForEdit = true;
            setViewState('edit');
            frame.src = currentEditUrl;
        });

        frame?.addEventListener('load', () => {
            if (!frameLoadedForEdit) return;
            let frameUrl = frame.getAttribute('src') || '';
            try {
                frameUrl = frame.contentWindow?.location?.href || frameUrl;
            } catch (error) {
                return;
            }
            if (!isEditingLocation(frameUrl)) {
                closeModal({ clearFrame: false });
                window.location.reload();
            }
        });

        document.querySelectorAll('[data-history-view-trigger]').forEach((trigger) => {
            trigger.addEventListener('click', () => {
                const sourceId = trigger.dataset.historyViewSource;
                const source = sourceId ? document.getElementById(sourceId) : null;
                if (!source || !body) return;

                if (title) {
                    title.textContent = trigger.dataset.historyViewTitle || 'Detalhes do lancamento';
                }
                if (kicker) {
                    currentKicker = trigger.dataset.historyViewKicker || 'Visualizacao';
                    kicker.textContent = currentKicker;
                }
                if (subtitle) {
                    const subtitleText = trigger.dataset.historyViewSubtitle || '';
                    subtitle.textContent = subtitleText;
                    subtitle.classList.toggle('hidden', !subtitleText);
                }
                body.innerHTML = source.innerHTML;

                const editUrl = trigger.dataset.historyViewEditUrl || '';
                currentEditUrl = editUrl ? `${editUrl}${editUrl.includes('?') ? '&' : '?'}modal=1` : '';
                if (editLink) {
                    if (currentEditUrl) {
                        editLink.href = currentEditUrl;
                        editLink.classList.remove('hidden');
                    } else {
                        editLink.classList.add('hidden');
                        editLink.removeAttribute('href');
                    }
                }
                setViewState('view');
                if (frame) {
                    frame.removeAttribute('src');
                }

                if (typeof modal.showModal === 'function') {
                    modal.showModal();
                }
            });
        });
    })();
</script>
