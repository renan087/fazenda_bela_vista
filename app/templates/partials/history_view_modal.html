<dialog id="history-view-modal" class="app-modal rounded-[2rem] p-0 shadow-2xl w-full max-w-5xl">
    <div class="flex max-h-[88vh] flex-col overflow-hidden bg-white p-6 sm:p-8">
        <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
                <p class="text-xs uppercase tracking-[0.35em] text-slate-400" data-history-view-kicker>Visualizacao</p>
                <h3 class="mt-2 text-2xl font-semibold text-slate-900" data-history-view-title>Detalhes do lancamento</h3>
                <p class="mt-2 text-sm text-slate-500" data-history-view-subtitle></p>
            </div>
            <button type="button" class="modal-close-button" aria-label="Fechar" data-history-view-close>
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 6 6 18"/>
                    <path d="m6 6 12 12"/>
                </svg>
            </button>
        </div>
        <div class="mt-6 min-h-0 flex-1 overflow-y-auto pr-1 space-y-4" data-history-view-body data-modal-scroll></div>
        <div class="mt-8 flex flex-wrap justify-end gap-3">
            <a href="#" class="hidden rounded-2xl bg-slate-900 px-5 py-3 font-semibold text-white hover:bg-slate-700" data-history-view-edit>Editar</a>
        </div>
    </div>
</dialog>
<dialog id="history-edit-modal" class="app-modal rounded-[2rem] p-0 shadow-2xl w-full max-w-5xl">
    <div class="flex max-h-[88vh] flex-col overflow-hidden bg-white p-6 sm:p-8">
        <div class="flex flex-wrap items-start justify-between gap-4">
            <div>
                <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Edicao</p>
                <h3 class="mt-2 text-2xl font-semibold text-slate-900" data-history-edit-title>Editar lancamento</h3>
                <p class="mt-2 text-sm text-slate-500">Atualize os dados sem sair da tela atual.</p>
            </div>
            <button type="button" class="modal-close-button" aria-label="Fechar" data-history-edit-close>
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 6 6 18"/>
                    <path d="m6 6 12 12"/>
                </svg>
            </button>
        </div>
        <div class="mt-6 min-h-0 flex-1 overflow-y-auto pr-1" data-history-edit-body data-modal-scroll></div>
    </div>
</dialog>
<script>
    (() => {
        const viewModal = document.getElementById('history-view-modal');
        const editModal = document.getElementById('history-edit-modal');
        if (!viewModal) return;

        const viewTitle = viewModal.querySelector('[data-history-view-title]');
        const viewSubtitle = viewModal.querySelector('[data-history-view-subtitle]');
        const viewKicker = viewModal.querySelector('[data-history-view-kicker]');
        const viewBody = viewModal.querySelector('[data-history-view-body]');
        const editLink = viewModal.querySelector('[data-history-view-edit]');
        const editBody = editModal?.querySelector('[data-history-edit-body]');
        const editTitle = editModal?.querySelector('[data-history-edit-title]');

        let currentEditUrl = '';
        let activeEditPanel = null;
        let activeEditPanelParent = null;
        let activeEditPanelNextSibling = null;

        const sanitizedCurrentUrl = () => {
            const url = new URL(window.location.href);
            url.searchParams.delete('edit_id');
            url.searchParams.delete('edit_output_id');
            url.searchParams.delete('modal');
            return `${url.pathname}${url.search}${url.hash}`;
        };

        const restoreEditPanel = () => {
            if (!activeEditPanel || !activeEditPanelParent) return;
            if (activeEditPanelNextSibling && activeEditPanelNextSibling.parentNode === activeEditPanelParent) {
                activeEditPanelParent.insertBefore(activeEditPanel, activeEditPanelNextSibling);
            } else {
                activeEditPanelParent.appendChild(activeEditPanel);
            }
            activeEditPanel = null;
            activeEditPanelParent = null;
            activeEditPanelNextSibling = null;
        };

        const closeViewModal = () => {
            if (typeof viewModal.close === 'function' && viewModal.open) {
                viewModal.close();
            }
        };

        const closeEditModal = ({ redirect = true } = {}) => {
            if (typeof editModal?.close === 'function' && editModal.open) {
                editModal.close();
            }
            restoreEditPanel();
            if (redirect) {
                window.location.href = sanitizedCurrentUrl();
            }
        };

        viewModal.querySelectorAll('[data-history-view-close]').forEach((button) => {
            button.addEventListener('click', closeViewModal);
        });

        viewModal.addEventListener('cancel', (event) => {
            event.preventDefault();
            closeViewModal();
        });

        editModal?.querySelectorAll('[data-history-edit-close]').forEach((button) => {
            button.addEventListener('click', () => closeEditModal());
        });

        editModal?.addEventListener('cancel', (event) => {
            event.preventDefault();
            closeEditModal();
        });

        editLink?.addEventListener('click', (event) => {
            if (!currentEditUrl) return;
            event.preventDefault();
            closeViewModal();
            window.location.href = currentEditUrl;
        });

        document.querySelectorAll('[data-history-view-trigger]').forEach((trigger) => {
            trigger.addEventListener('click', () => {
                const sourceId = trigger.dataset.historyViewSource;
                const source = sourceId ? document.getElementById(sourceId) : null;
                if (!source || !viewBody) return;

                if (viewTitle) {
                    viewTitle.textContent = trigger.dataset.historyViewTitle || 'Detalhes do lancamento';
                }
                if (viewKicker) {
                    viewKicker.textContent = trigger.dataset.historyViewKicker || 'Visualizacao';
                }
                if (viewSubtitle) {
                    const subtitleText = trigger.dataset.historyViewSubtitle || '';
                    viewSubtitle.textContent = subtitleText;
                    viewSubtitle.classList.toggle('hidden', !subtitleText);
                }
                viewBody.innerHTML = source.innerHTML;

                currentEditUrl = trigger.dataset.historyViewEditUrl || '';
                if (editLink) {
                    if (currentEditUrl) {
                        editLink.href = currentEditUrl;
                        editLink.classList.remove('hidden');
                    } else {
                        editLink.classList.add('hidden');
                        editLink.removeAttribute('href');
                    }
                }

                if (typeof viewModal.showModal === 'function') {
                    viewModal.showModal();
                }
            });
        });

        const initialEditPanel = document.querySelector('[data-history-edit-panel][data-history-edit-open="1"]');
        if (editModal && editBody && initialEditPanel) {
            activeEditPanel = initialEditPanel;
            activeEditPanelParent = initialEditPanel.parentNode;
            activeEditPanelNextSibling = initialEditPanel.nextSibling;
            editBody.appendChild(initialEditPanel);

            const panelTitle = initialEditPanel.querySelector('h3');
            if (editTitle && panelTitle?.textContent?.trim()) {
                editTitle.textContent = panelTitle.textContent.trim();
            }

            if (typeof editModal.showModal === 'function') {
                editModal.showModal();
            }
        }
    })();
</script>
