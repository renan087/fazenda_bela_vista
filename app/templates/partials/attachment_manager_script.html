<script>
    (() => {
        const formatKb = (size) => `${Math.max(1, Math.round((size || 0) / 1024))} KB`;
        const fileKey = (file) => [file.name, file.size, file.lastModified, file.type].join("::");

        document.querySelectorAll('[data-attachment-manager]').forEach((manager) => {
            const form = manager.closest('form');
            const pickerSlot = manager.querySelector('[data-attachments-picker-slot]');
            const submitInput = manager.querySelector('[data-attachments-submit-input]');
            const feedback = manager.querySelector('[data-attachments-feedback]');
            const pendingBox = manager.querySelector('[data-attachments-pending]');
            const pendingList = manager.querySelector('[data-attachments-pending-list]');
            const clearButton = manager.querySelector('[data-attachments-clear]');
            if (!form || !pickerSlot || !submitInput || !feedback || !pendingBox || !pendingList) return;

            let pendingFiles = [];

            const refreshState = () => {
                if (!pendingFiles.length) {
                    pendingBox.classList.add('hidden');
                    feedback.classList.add('hidden');
                    feedback.textContent = '';
                    pendingList.innerHTML = '';
                    return;
                }

                pendingList.innerHTML = '';
                pendingFiles.forEach((file, index) => {
                    const row = document.createElement('div');
                    row.className = 'flex flex-wrap items-center justify-between gap-3 rounded-2xl bg-white px-4 py-3';

                    const content = document.createElement('div');
                    content.className = 'min-w-0';

                    const title = document.createElement('p');
                    title.className = 'truncate text-sm font-medium text-slate-900';
                    title.textContent = file.name;

                    const meta = document.createElement('p');
                    meta.className = 'mt-1 text-xs text-slate-500';
                    meta.textContent = `${file.type || 'documento'} • ${formatKb(file.size)}`;

                    const removeButton = document.createElement('button');
                    removeButton.type = 'button';
                    removeButton.className = 'rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs font-medium text-slate-700 hover:bg-slate-100';
                    removeButton.textContent = 'Remover';
                    removeButton.addEventListener('click', () => {
                        pendingFiles = pendingFiles.filter((_, itemIndex) => itemIndex !== index);
                        refreshState();
                    });

                    content.appendChild(title);
                    content.appendChild(meta);
                    row.appendChild(content);
                    row.appendChild(removeButton);
                    pendingList.appendChild(row);
                });

                pendingBox.classList.remove('hidden');
                feedback.textContent = `${pendingFiles.length} anexo(s) pendente(s). O envio so acontecera ao salvar.`;
                feedback.classList.remove('hidden');
            };

            const bindPicker = (picker) => {
                picker.addEventListener('change', () => {
                    const files = Array.from(picker.files || []);
                    if (!files.length) return;
                    const known = new Set(pendingFiles.map(fileKey));
                    files.forEach((file) => {
                        const key = fileKey(file);
                        if (!known.has(key)) {
                            pendingFiles.push(file);
                            known.add(key);
                        }
                    });
                    picker.value = '';
                    refreshState();
                });
            };

            const initialPicker = pickerSlot.querySelector('[data-attachments-picker]');
            if (initialPicker) {
                bindPicker(initialPicker);
            }

            clearButton?.addEventListener('click', () => {
                pendingFiles = [];
                submitInput.value = '';
                refreshState();
            });

            form.addEventListener('submit', () => {
                const transfer = new DataTransfer();
                pendingFiles.forEach((file) => transfer.items.add(file));
                submitInput.files = transfer.files;
            });
        });

        document.querySelectorAll('[data-attachment-delete-form]').forEach((deleteForm) => {
            deleteForm.addEventListener('submit', (event) => {
                const attachmentName = deleteForm.getAttribute('data-attachment-name') || 'este anexo';
                if (!window.confirm(`Excluir o anexo "${attachmentName}"?`)) {
                    event.preventDefault();
                }
            });
        });
    })();
</script>
