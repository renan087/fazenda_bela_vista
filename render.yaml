services:
  - type: web
    name: fazenda-bela-vista-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: APP_TIMEZONE
        value: America/Sao_Paulo
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ADMIN_NAME
        value: Renan Terra Castro Correia
      - key: ADMIN_EMAIL
        value: renan087@gmail.com
      - key: SUPER_ADMIN_EMAIL
        value: renan087@gmail.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: DATABASE_URL_OVERRIDE
        fromDatabase:
          name: fazenda-bela-vista-db
          property: connectionString
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false

databases:
  - name: fazenda-bela-vista-db
    plan: free
